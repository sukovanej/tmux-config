set -g base-index 1
set -g mouse on

# Prevent programs from renaming windows via escape sequences
set -g allow-rename off

# Inactive window: rounded edges, number on darker gray, program on lighter gray
set -g window-status-format "#[fg=#555555,bg=default]#[fg=#cccccc,bg=#555555] #I  #[fg=#cccccc,bg=#666666]  #{pane_current_command} #[fg=#666666,bg=default]"
# Active window: rounded edges, number on darker blue, program on lighter blue
set -g window-status-current-format "#[fg=#1a5fb4,bg=default]#[fg=#ffffff,bg=#1a5fb4,bold] #I  #[fg=#ffffff,bg=#3584e4,bold]  #{pane_current_command} #[fg=#3584e4,bg=default]"
set -g window-status-separator " "
set -g status-style "bg=default"
set -g status-left "  "
set -g message-style "bg=default"
set -g status-justify left
set -g status-right "#[fg=#2ec27e,bg=default]#[fg=#ffffff,bg=#2ec27e,bold] #S #[fg=#2ec27e,bg=default]  "

set -g mode-keys vi

# Vim-style pane navigation (hjkl as alternatives to arrow keys)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
